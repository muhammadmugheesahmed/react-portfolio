<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <!-- Brand Gradients -->
  <defs>
    <!-- Primary vibrant green gradient -->
    <linearGradient id="emeraldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#01b981" />
    </linearGradient>
    <!-- Darker emerald accent for depth -->
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#01b981" />
      <stop offset="100%" stop-color="#047857" />
    </linearGradient>
  </defs>
  
  <!-- Outer Modern Soft-Square -->
  <rect x="10" y="10" width="80" height="80" rx="24" fill="#0B0F19" stroke="url(#emeraldGrad)" stroke-width="2" />
  
  <!-- Abstract Stacked 'M' / Code Symbol -->
  <path d="M30 65V35L50 52L70 35V65" stroke="url(#emeraldGrad)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M40 65H60" stroke="url(#accentGrad)" stroke-width="6" stroke-linecap="round"/>
</svg>
